server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /robots.txt {
    add_header Cache-Control "public, max-age=300";
  }

  location = /sitemap.xml {
    add_header Cache-Control "public, max-age=300";
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=86400, immutable";
  }
}
