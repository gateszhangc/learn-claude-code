apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: learn-claude-code-live
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    cert-manager.io/issue-temporary-certificate: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - secretName: learn-claude-code-lol-tls
      hosts:
        - learn-claude-code.lol
        - www.learn-claude-code.lol
  rules:
    - host: learn-claude-code.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: learn-claude-code
                port:
                  number: 80
    - host: www.learn-claude-code.lol
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: learn-claude-code
                port:
                  number: 80
